const REG = [];  // every placed marker: {key, marker, group} — discard support
function marker(p, cls, kind, style) {
  const icon = L.divIcon({ className: "", iconSize: null,
    html: `<div class="mk ${cls}" style="${style || ""}">${p.label}</div>` });
  return L.marker([p.lat, p.lon], { icon, title: `${kind} · ${p.dur}`, durS: p.dur_s, pt: p })
    .bindPopup(() => popupHtml(p, kind), { maxWidth: 330 });  // function: regenerated fresh every open, so ★ favorito reflects live state
}
function addPt(group, p, cls, kind, style) {
  const m = marker(p, cls, kind, style);
  REG.push({ key: `${p.lat},${p.lon}`, marker: m, group });
  group.addLayer(m);
  return m;
}

// sequential single-hue ramp: totality seconds, light -> dark
const DUR_RAMP = [
  [50,  "#A9C6E8", "#1A202C"],   // < 50 s
  [75,  "#6497CC", "#1A202C"],   // 50-74 s
  [95,  "#2B6CB0", "#fff"],      // 75-94 s
  [1e9, "#17456E", "#fff"],      // >= 95 s
];
function durStyle(s) {
  const [, bg, fg] = DUR_RAMP.find(([lim]) => s < lim);
  return `background:${bg};color:${fg}`;
}

// sun-direction arrow: drawn on the map whenever a point's popup opens, so
// the exact eclipse bearing can be eyeballed against terrain/satellite and
// used as a reference when cross-checking in Google Maps / Street View
let sunArrow = null;
function removeSunArrow() { if (sunArrow) { map.removeLayer(sunArrow); sunArrow = null; } }
function drawSunArrow(p) {
  removeSunArrow();
  const mLat = 111320, mLon = 111320 * Math.cos(p.lat * Math.PI / 180);
  const proj = (from, azDeg, meters) => {
    const r = azDeg * Math.PI / 180;
    return [from[0] + meters * Math.cos(r) / mLat, from[1] + meters * Math.sin(r) / mLon];
  };
  const from = [p.lat, p.lon];
  const tip = proj(from, p.az, 2000);
  sunArrow = L.layerGroup([
    L.polyline([from, tip], { color: "#E4572E", weight: 3, opacity: .9, interactive: false }),
    L.polyline([proj(tip, p.az + 150, 350), tip, proj(tip, p.az - 150, 350)],
               { color: "#E4572E", weight: 3, opacity: .9, interactive: false }),
    L.marker(tip, { interactive: false, icon: L.divIcon({ className: "", iconSize: null,
      html: `<div class="sun-arrow-label">☀ eclipse · ${p.az}° · ${(p.c2 || "").slice(0, 5)}</div>` }) }),
  ]).addTo(map);
}
map.on("popupopen", e => {
  const p = e.popup._source && e.popup._source.options && e.popup._source.options.pt;
  if (p && p.az != null) drawSunArrow(p);
});
map.on("popupclose", removeSunArrow);

function zoneReg(p, cls, kind) {

// used by the search box: fly to the zone and flash its bubble so it's

// when arriving zoomed-out); tap the highlighted bubble for that, as usual.
function flyToZone(name) {

  map.once("moveend", () => {

Object.values(ZONES).forEach(z => {
  const lls = z.pts.map(m => m.getLatLng());
  z.bounds = L.latLngBounds(lls);
  const c = [lls.reduce((a, l) => a + l.lat, 0) / lls.length,
             lls.reduce((a, l) => a + l.lng, 0) / lls.length];
  z.bubble = L.marker(c, { icon: bubbleIcon(z) }).on("click", () => openZone(z.name));
  lyZonas.addLayer(z.bubble);
});

// zone search: type-ahead over the 16 fixed zone names, jumps like clicking its bubble.
// A <form> (not a bare input) is what makes mobile keyboards fire a "Go/Buscar"
// submit reliably; matching is accent/case-insensitive and accepts partial text
// ("xistral" -> "Serra do Xistral"), since exact-match-only was unusable on phones.
function normZ(s) {
  return s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
}
function findZone(query) {
  const q = normZ(query);
  if (!q) return null;
  const names = Object.keys(ZONES);
  return names.find(n => normZ(n) === q) ||
         names.find(n => normZ(n).startsWith(q)) ||
         names.find(n => normZ(n).includes(q)) || null;
}
// also accepts pasted coordinates ("43.0735, -7.29255", from a Maps/Street
// View link) and jumps to the nearest actual marker with its popup open —
// there's no "add favorite by coordinate" (favorites live in each phone's
// own browser), this is the fastest way to find and tap ⭐ yourself.
function parseCoords(q) {
  // decimal pairs, including inside pasted Google Maps URLs (@lat,lon / query=lat,lon)
  const m = q.match(/(-?\d{1,2}\.\d{3,})[,\s]+(-?\d{1,3}\.\d{3,})/);
  if (m) return { lat: parseFloat(m[1]), lon: parseFloat(m[2]) };
  // DMS, the format Google Maps copies by default: 43°04'24.6"N 7°17'33.2"W
  const dms = /(\d{1,3})°\s*(\d{1,2})['′]\s*([\d.]+)?["″]?\s*([NSEWO])/gi;
  const parts = [...q.matchAll(dms)].map(p => {
    const val = (+p[1]) + (+p[2]) / 60 + (+(p[3] || 0)) / 3600;
    return /[SWO]/i.test(p[4]) ? -val : val;   // O = Oeste
  });
  return parts.length >= 2 ? { lat: parts[0], lon: parts[1] } : null;
}
function nearestMarker(lat, lon) {
  let best = null, bestKm = Infinity;
  REG.forEach(r => {
    const [rlat, rlon] = r.key.split(",").map(Number);
    const km = Math.hypot(rlat - lat, (rlon - lon) * Math.cos(lat * Math.PI / 180)) * 111.32;
    if (km < bestKm) { bestKm = km; best = r; }
  });
  return best && bestKm < 5 ? { ...best, km: bestKm } : null;
}
// used by search-by-coords AND the favorites/discards lists ("go here" links)
function gotoMarker(r) {
  if (!r) return;
  if (!map.hasLayer(r.group)) map.addLayer(r.group);
  // if the target lives inside a zone group, retire that zone's bubble so it
  // doesn't keep floating over its now-expanded points
  const z = Object.values(ZONES).find(z => z.group === r.group);
  if (z) lyZonas.removeLayer(z.bubble);
  map.flyTo(r.marker.getLatLng(), Math.max(map.getZoom(), 13), { duration: 0.8 });
  map.once("moveend", () => r.marker.openPopup());
}
window.gotoKey = async k => {
  // collapse the panel first: otherwise the point popup opens on top of it
  // and you get two big cards stacked, hard to tell which "x" closes what
  tallyOpen = false; tallyView = "main"; updateTally();
  let r = REG.find(r => r.key === k);
  if (!r) {  // maybe it's a walking alternative whose details aren't loaded yet
    try { await loadExtras(); } catch (e) { return; }
    r = REG.find(r => r.key === k);
  }
  // a discarded point has no visible marker: without this notice, searching
  // its ID flies to empty terrain in silence and looks like a broken search
  if (discarded.has(k)) {
    const why = discarded.get(k);
    toast(`⚠️ ${KEY2ID[k] || k} está descartado${why ? `: ${why}` : ""} — restaurable en «ver descartados»`);
  }
  gotoMarker(r);
};
// last-resort fallback: real place names ("As Pontes de García Rodríguez")
// aren't among the 16 synthetic zone names, so geocode them (free, no key).
// Photon (komoot) first — it tolerates typos/missing accents the way Google
// Maps does ("As Ponte de Garcia Rodrigez" still resolves); Nominatim as a
// stricter fallback if Photon has nothing. Both biased to Galicia.
async function geocode(query) {
  try {
    const res = await fetch("https://photon.komoot.io/api/?limit=1&lat=40.2&lon=-0.8&zoom=9&q=" +
      encodeURIComponent(query));
    const j = await res.json();
    const f = j.features && j.features[0];
    if (f) {
      const [lon, lat] = f.geometry.coordinates;
      // keep it roughly inside Galicia — otherwise "paris" flies you to France
      if (lat > 38.7 && lat < 42.0 && lon > -2.6 && lon < 1.0) return { lat, lon };
    }
  } catch (e) { /* fall through to Nominatim */ }
  try {
    const url = "https://nominatim.openstreetmap.org/search?format=json&limit=1" +
      "&viewbox=-2.6,42.0,1.0,38.7&bounded=1&q=" +
      encodeURIComponent(query + ", España");
    const res = await fetch(url, { headers: { "Accept-Language": "es" } });
    const arr = await res.json();
    return arr.length ? { lat: parseFloat(arr[0].lat), lon: parseFloat(arr[0].lon) } : null;
  } catch (e) { return null; }
}
function flashPlace(lat, lon) {
  const m = L.circleMarker([lat, lon], { radius: 10, color: "#2B6CB0", weight: 3, fill: false }).addTo(map);
  let n = 0;
  const iv = setInterval(() => {
    m.setStyle({ opacity: n % 2 ? 1 : 0.15 });
    if (++n > 5) { clearInterval(iv); map.removeLayer(m); }
  }, 260);
}
window.doSearch = async () => {
  const input = document.getElementById("searchInput");
  const query = input.value;
  // point ID lookup first: "K7Q2M" (with or without a P- prefix) jumps straight there
  const idQ = query.trim().toUpperCase().replace(/^P-?/, "");
  let idKey = ID2KEY[idQ];
  if (!idKey && /^[23456789A-HJKMNP-Z]{5}$/.test(idQ)) {
    // ID-shaped but unknown: might belong to a not-yet-loaded walking alternative
    try { await loadExtras(); idKey = ID2KEY[idQ]; } catch (e) { /* offline */ }
  }
  if (idKey) { gotoKey(idKey); input.value = ""; input.blur(); return false; }
  const coords = parseCoords(query);
  const near = coords && nearestMarker(coords.lat, coords.lon);
  if (near) { gotoMarker(near); input.value = ""; input.blur(); return false; }
  const name = findZone(query);
  if (name) { flyToZone(name); input.value = ""; input.blur(); return false; }
  if (!query.trim()) return false;
  const btn = document.querySelector("#search button[type=submit]");
  btn.textContent = "…";
  const place = await geocode(query);
  btn.textContent = "🔍";
  if (place) {
    const nearPlace = nearestMarker(place.lat, place.lon);
    if (nearPlace) { gotoMarker(nearPlace); }
    else { map.flyTo([place.lat, place.lon], 12, { duration: 0.8 });
           map.once("moveend", () => flashPlace(place.lat, place.lon)); }
    input.value = ""; input.blur();
    return false;
  }
  input.style.borderColor = "#C53030";
  setTimeout(() => { input.style.borderColor = ""; }, 900);
  return false;
};

try { pending = JSON.parse(localStorage.getItem(LS_PEND) || "[]"); } catch (e) {}
function savePending() { localStorage.setItem(LS_PEND, JSON.stringify(pending)); }
let recentSent = [];   // delivered <1 min ago: the Sheet may not echo them yet
let sheetV2 = false;   // backend supports favorites (v2 Apps Script deployed)
let groupFavs = {};    // key -> [names] favorited by the group (v2 only)
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove("show"), 2600);
}
let flushing = false;
let rejectedWarned = false;
async function flushQueue() {
  if (!SHEET_URL || flushing) return;
  flushing = true;
  while (pending.length) {
    try {
      // Apps Script's 302 -> googleusercontent carries CORS headers and a
      // readable plain-text body ("ok" / "bad token"). A string body avoids
      // the preflight Apps Script can't answer; reading the reply is what
      // keeps a rejected write from silently draining the queue.
      const res = await fetch(SHEET_URL, { method: "POST",
        body: JSON.stringify(pending[0]) });
      const txt = (await res.text()).trim();
      if (txt === "bad token") {
        pending.shift(); savePending();   // retrying can never succeed
        if (!rejectedWarned) {
          rejectedWarned = true;
          alert("La hoja compartida rechazó la escritura (versión antigua del mapa). Recarga la página e inténtalo de nuevo.");
        }
        continue;
      }
      if (!res.ok || txt !== "ok") break;  // backend hiccup — keep queued, retry later
      recentSent.push({ ...pending[0], at: Date.now() });
      pending.shift(); savePending();
    } catch (e) { break; }   // still offline — retried on 'online' or next load
  }
  flushing = false;
  updateTally();
}
window.addEventListener("online", flushQueue);
function postSheet(action, k, why) {
  if (!SHEET_URL) return;
  pending.push({ action, key: k, why: why || "", who: NOMBRE || "anónimo", t: TOKEN });
  savePending();
  flushQueue();
}
let syncing = false;
window.sincronizar = async (silent) => {
  if (!SHEET_URL || syncing) return;
  syncing = true; updateTally();   // the panel shows "⏳ sincronizando…" meanwhile
  await flushQueue();
  try {
    const raw = await (await fetch(SHEET_URL)).json();
    sheetV2 = !!raw && typeof raw.v === "number" && raw.v >= 2;
    // the Sheet is shared across region maps (Galicia + Meseta): ignore keys
    // that don't belong to this page's dataset (or to actions in flight here)
    const known = k => !!KEY2ID[k] || pending.some(p => p.key === k) ||
      recentSent.some(p => p.key === k);
    groupFavs = {};
    if (sheetV2) Object.entries(raw.favs || {}).forEach(([k, v]) => {
      if (known(k)) groupFavs[k] = v;
    });
    const discRaw = sheetV2 ? (raw.discards || {}) : raw;
    const merged = new Map(Object.entries(discRaw).filter(([k]) => known(k)).map(([k, v]) =>
      [k, (v.why || "") + (v.who ? ` (👤${v.who})` : "")]));
    // overlay local actions the Sheet can't reflect yet: still-queued ones and
    // those delivered in the last minute (append -> read lag). Newest wins —
    // this is what keeps an offline discard from being clobbered by a sync.
    recentSent = recentSent.filter(p => Date.now() - p.at < 60000);
    [...recentSent, ...pending].forEach(p => {
      if (p.action === "discard") merged.set(p.key, (p.why || "") + (p.who ? ` (👤${p.who})` : ""));
      else if (p.action === "restore") merged.delete(p.key);
    });
    REG.forEach(r => { if (!r.group.hasLayer(r.marker)) r.group.addLayer(r.marker); });
    discarded = merged;
    for (const k of discarded.keys()) applyDiscard(k);
    // first contact with a v2 backend: push the favorites marked before it existed
    if (sheetV2 && !localStorage.getItem("eclipseval_favs_pushed")) {
      for (const k of favoritos.keys()) postSheet("favorite", k);
      localStorage.setItem("eclipseval_favs_pushed", "1");
    }
    // adopt your own sheet favorites on this device: same name = same person,
    // so a favorite marked on the phone shows as YOURS (solid gold) on the
    // laptop too, instead of as a dashed "someone in the group" ring
    if (NOMBRE) {
      let adopted = false;
      Object.entries(groupFavs).forEach(([k, whos]) => {
        // accent/case-insensitive: "borja" on the phone = "Borja" on the laptop
        if (whos.some(w => normZ(w) === normZ(NOMBRE)) && !favoritos.has(k)) { favoritos.set(k, ""); adopted = true; }
      });
      if (adopted) saveFav();
    }
    saveDisc(); refreshFavIcons();
    if (!silent) toast(`✓ Sincronizado · 🗑 ${discarded.size}` +
      (sheetV2 ? ` · ⭐ grupo ${Object.keys(groupFavs).length}` : ""));
  } catch (e) { if (!silent) alert("No se pudo sincronizar con la hoja: " + e); }
  finally { syncing = false; updateTally(); }
};
window.descartar = k => {
  if (!NOMBRE) {
    setNombre();   // ask once; if they cancel, make the anonymity explicit
    if (!NOMBRE && !confirm("Sin nombre, el grupo no sabrá quién descartó este punto. ¿Descartar como anónimo?")) return;
  }
  const why = prompt("¿Por qué se descarta? (opcional — llega a los demás al compartir)");
  if (why === null) return;  // cancelled: keep the point
  discarded.set(k, why.trim()); applyDiscard(k); map.closePopup(); saveDisc();
  postSheet("discard", k, why.trim());
};
// gold ring on favorited markers: solid = yours, dashed = someone else's (v2)
function refreshFavIcons() {
  REG.forEach(r => {
    const el = r.marker.getElement();
    const inner = el && el.querySelector(".mk");
    if (!inner) return;
    inner.classList.toggle("mk-fav", favoritos.has(r.key));
    inner.classList.toggle("mk-fav-group", !favoritos.has(r.key) && !!groupFavs[r.key]);
  });
}
let favIconTimer = null;   // debounced: a zone-open adds dozens of layers at once
map.on("layeradd", () => {
  clearTimeout(favIconTimer);
  favIconTimer = setTimeout(refreshFavIcons, 60);
});
window.restaurarUno = k => {
  // restoring someone ELSE's discard undoes their work for the whole group
  // (the sheet has no change feed) — make it deliberate, not a stray tap
  const val = discarded.get(k) || "";
  const m = val.match(/\(👤([^)]+)\)\s*$/);
  const autor = m ? m[1] : "";
  if (autor && normZ(autor) !== normZ(NOMBRE || "") &&
      !confirm(`Lo descartó ${autor}: «${val.replace(/\s*\(👤[^)]+\)\s*$/, "") || "sin motivo"}». ¿Restaurar igualmente para todo el grupo?`)) return;
  discarded.delete(k);
  REG.forEach(r => { if (r.key === k && !r.group.hasLayer(r.marker)) r.group.addLayer(r.marker); });
  saveDisc();
  postSheet("restore", k);
};
window.restaurarTodo = () => {
  if (!discarded.size) return;
  if (!confirm(`Vas a restaurar los ${discarded.size} puntos descartados de TODO el grupo` +
               ` (se deshace también en la hoja compartida). ¿Seguro?`)) return;
  for (const k of discarded.keys()) postSheet("restore", k);
  discarded.clear();
  REG.forEach(r => { if (!r.group.hasLayer(r.marker)) r.group.addLayer(r.marker); });
  saveDisc();
};
// share the triage: each friend exports their discards (with reasons) and
// sends the code back; importing MERGES them with yours
window.exportarFiltrado = () => {
  navigator.clipboard.writeText(JSON.stringify(Object.fromEntries(discarded)));
  alert(`Copiado: ${discarded.size} descartes con sus motivos. Pégalo en el chat del grupo.`);
};
window.importarFiltrado = () => {
  const t = prompt("Pega aquí el filtrado de tu amigo:");
  if (!t) return;
  try {
    const v = JSON.parse(t);
    const entries = Array.isArray(v) ? v.map(k => [k, ""]) : Object.entries(v);
    entries.forEach(([k, why]) => {
      if (!discarded.has(k) || why) discarded.set(k, why || discarded.get(k) || "");
      applyDiscard(k);
    });
  } catch (e) { alert("Eso no parece un filtrado exportado."); return; }
  saveDisc();
};
// legend (bottom-left) and tally (bottom-right) are two independent Leaflet
// corner controls; on a narrow phone their expanded widths overlap in the
// middle, so only one is ever allowed open at a time there (isNarrow()).
const isNarrow = () => window.matchMedia("(max-width: 480px)").matches;
let legendOpen = window.innerWidth >= 480;
let tallyView = "main";  // "main" | "list" — the discard list lives inside the tally panel
window.toggleLegend = () => {
  legendOpen = !legendOpen;
  if (legendOpen && isNarrow()) tallyOpen = false;
  renderLegend(); updateTally();
};
window.toggleTally = () => {
  tallyOpen = !tallyOpen;
  if (tallyOpen && isNarrow()) legendOpen = false;
  updateTally(); renderLegend();
};
window.toggleLista = () => { tallyView = tallyView === "list" ? "main" : "list"; updateTally(); };
window.toggleFavs = () => { tallyView = tallyView === "favs" ? "main" : "favs"; updateTally(); };
function listaHtml() {
  if (!discarded.size) return "<i>(nada descartado)</i>";
  const title = k => (REG.find(r => r.key === k)?.marker.options.title) || "";
  return [...discarded].map(([k, why]) => `<div class="dlist-entry">` +
    `<code>${KEY2ID[k] || "?"}</code> ${title(k)} <small>(${k})</small><br><i>${why || "sin motivo"}</i> — ` +
    `<a href="#" onclick="restaurarUno('${k}');return false">restaurar</a></div>`).join("");
}
function favsHtml() {
  const title = k => (REG.find(r => r.key === k)?.marker.options.title) || "";
  let h = "";
  if (!favoritos.size) h += "<i>(sin favoritos — márcalos desde el popup de cada punto)</i>";
  else {
    h += [...favoritos.keys()].map(k => `<div class="dlist-entry">` +
      `⭐ <code>${KEY2ID[k] || "?"}</code> <a href="#" onclick="gotoKey('${k}');return false">${title(k)} <small>(${k})</small></a> — ` +
      `<a href="#" onclick="toggleFavorito('${k}');return false">quitar</a></div>`).join("");
    h += `<div class="dlist-entry"><a href="#" onclick="copiarFavoritos();return false">📋 copiar lista</a></div>`;
  }
  const others = Object.entries(groupFavs).filter(([k]) => !favoritos.has(k));
  if (others.length) {
    h += `<div class="dlist-entry"><b>⭐ del grupo</b></div>` + others.map(([k, whos]) =>
      `<div class="dlist-entry">⭐ <code>${KEY2ID[k] || "?"}</code> ` +
      `<a href="#" onclick="gotoKey('${k}');return false">${title(k)} ` +
      `<small>(${k})</small></a> <small>· ${whos.join(", ")}</small></div>`).join("");
  }
  h += `<div class="dlist-entry"><a href="#" onclick="descargarKml();return false">⬇ KML offline (favoritos + planes + top-20)</a>` +
       `<br><small>El 12-ago puede no haber cobertura: impórtalo la víspera en Organic Maps / Google Maps con el área descargada.</small></div>`;
  return h;
}
window.copiarFavoritos = () => {
  const title = k => (REG.find(r => r.key === k)?.marker.options.title) || "";
  const txt = [...favoritos.keys()].map(k =>
    `⭐ ${KEY2ID[k] || "?"} · ${title(k)} — https://www.google.com/maps/search/?api=1&query=${k}`).join("\n");
  navigator.clipboard.writeText(txt);
  toast("Lista de favoritos copiada — pégala en el chat");
};
// offline plan for the day: coverage in the field is NOT guaranteed, so the
// KML carries everything worth navigating to (favorites, group pins, plans
// A/B/C and the top-20), not just your own favorites
window.descargarKml = () => {
  const seen = new Set();
  const esc = s => String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const pm = [];
  const add = (k, name, desc) => {
    if (seen.has(k)) return;
    seen.add(k);
    const [la, lo] = k.split(",");
    pm.push(`<Placemark><name>${esc(name)}</name>` +
      (desc ? `<description>${esc(desc)}</description>` : "") +
      `<Point><coordinates>${lo},${la},0</coordinates></Point></Placemark>`);
  };
  const title = k => (REG.find(r => r.key === k)?.marker.options.title) || "punto";
  const pinfo = p => `totalidad ${p.dur} · C2 ${p.c2} · sol ${p.az}° a ${p.alt}° · asfalto a ${p.rvd} m`;
  [...favoritos.keys()].forEach(k => add(k, `⭐ ${KEY2ID[k] || ""} ${title(k)}`));
  Object.keys(groupFavs).forEach(k => add(k, `⭐ ${KEY2ID[k] || ""} ${title(k)} (grupo)`));
  (D.fijados || []).forEach(p => add(`${p.lat},${p.lon}`, `📌 ${p.id} fijado del grupo · ${p.dur}`, pinfo(p)));
  (D.seleccion || []).forEach(p => add(`${p.lat},${p.lon}`, `${p.tier_name} · ${p.id} · ${p.dur}`, pinfo(p)));
  (D.top20 || []).forEach(p => add(`${p.lat},${p.lon}`, `Top #${p.rank} · ${p.id} · ${p.dur}`, pinfo(p)));
  const kml = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2">` +
    `<Document><name>Eclipse 12-08-2026 — puntos (${pm.length})</name>${pm.join("")}</Document></kml>`;
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([kml], { type: "application/vnd.google-earth.kml+xml" }));
  a.download = "eclipse-2026-puntos.kml";
  a.click(); URL.revokeObjectURL(a.href);
  toast("KML descargado (favoritos + fijados + planes + top-20) — impórtalo en Organic Maps o Google Maps la víspera: el 12-ago puede no haber cobertura");
};
const tally = L.control({ position: "bottomright" });
tally.onAdd = () => {
  const d = L.DomUtil.create("div", "legend");
  d.id = "tally";
  L.DomEvent.disableClickPropagation(d);
  return d;
};
tally.addTo(map);
let lastTallyHtml = "";
function updateTally() {
  const toggle = `<a href="#" onclick="toggleTally();return false" style="font-weight:700">` +
    `${tallyOpen ? "▾" : "▸"} 🗑 ${discarded.size} · ⭐ ${favoritos.size}` +
    `${pending.length ? " · ⏳" + pending.length : ""}` +
    `${NOMBRE ? " · 👤 " + NOMBRE : ""}</a>`;
  let html;
  if (!tallyOpen) html = toggle;
  else if (tallyView === "list") {
    html = toggle + "<br>" +
      `<a href="#" onclick="toggleLista();return false">‹ volver</a><br>` + listaHtml();
  } else if (tallyView === "favs") {
    html = toggle + "<br>" +
      `<a href="#" onclick="toggleFavs();return false">‹ volver</a><br>` + favsHtml();
  } else {
    html = toggle + "<br>" +
      (pending.length ? `<small>⏳ ${pending.length} sin enviar (mala cobertura): se reenvían solos.</small><br>` : "") +
      `🖊️ Tu nombre: <b>${NOMBRE || "sin poner"}</b> ` +
      `<a href="#" onclick="setNombre();return false">${NOMBRE ? "cambiar" : "ponlo"}</a> ` +
      `<small>queda junto a cada punto que descartes, para que el grupo sepa quién fue</small><br>` +
      `<a href="#" onclick="toggleLista();return false">ver descartados</a> · ` +
      `<a href="#" onclick="toggleFavs();return false">ver favoritos</a> · ` +
      `<a href="#" onclick="restaurarTodo();return false">restaurar todos</a><br>` +
      (SHEET_URL
        ? (syncing ? `<small>⏳ sincronizando con el grupo…</small><br>`
                   : `<a href="#" onclick="sincronizar();return false">🔄 sincronizar con el grupo</a><br>`)
        : `<a href="#" onclick="exportarFiltrado();return false">📤 copiar mi filtrado</a> · ` +
          `<a href="#" onclick="importarFiltrado();return false">📥 importar</a><br>`) +
      `<a href="#" onclick="replegarZonas();return false">⬆ replegar zonas</a>`;
  }
  // only touch the DOM when something actually changed: the auto-sync used to
  // rebuild this panel's innerHTML every few minutes, destroying whatever
  // button the user was mid-tapping (taps silently swallowed)
  if (html !== lastTallyHtml) {
    lastTallyHtml = html;
    document.getElementById("tally").innerHTML = html;
  }
}
for (const k of discarded.keys()) applyDiscard(k);
updateTally();
refreshBubbles();
refreshFavIcons();
if (SHEET_URL) sincronizar(true);
// long-lived tabs: re-pull the group state every 5 min while visible
setInterval(() => { if (document.visibilityState === "visible") sincronizar(true); }, 300000);
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") sincronizar(true);
});

const legend = L.control({ position: "bottomleft" });
const legendBody = `<small style="color:#999">versión 2026-07-18 17:14</small><br>
    <a href="./">🔁 Mapa Galicia (grupo de Ramón)</a><br>
    Todos los puntos muestran su totalidad en segundos.<br>
    <span class="dot" style="background:#E4572E"></span>Top 1–20 por score (Gúdar–Javalambre)<br>
    <span class="dot" style="background:#2F855A"></span>Compromisos: máx. totalidad por distancia<br>
    Burbuja "Gúdar / Valdelinares · 95s ×8" = zona con 8 puntos, el mejor de 95 s — clic para abrirla.<br>
    Mejor de cada zona (píldora) + alternativas (punto):<br>
    <span class="dot" style="background:#A9C6E8"></span>&lt;50s
    <span class="dot" style="background:#6497CC"></span>50–74s
    <span class="dot" style="background:#2B6CB0"></span>75–94s
    <span class="dot" style="background:#17456E"></span>≥95s<br>
    <span style="color:#C53030">- - -</span> límite sur de la totalidad e isolíneas 30/60/90 s<br>
    <span class="dot" style="background:#0987A0"></span>Capa opcional "Playas": horizonte de mar
    hacia el sol — actívala en el control de capas (esquina superior derecha).<br>
    <small>Capa opcional "Selección final": 10 elegidos en planes A/B/C.
    Anillos desde Valencia. Distancias en línea recta; coche ≈ ×1.3.</small>`;
function renderLegend() {
  document.getElementById("legend").innerHTML =
    `<span id="legend-toggle" onclick="toggleLegend()">${legendOpen ? "▾" : "▸"} ℹ️ Eclipse 12-08-2026 · Teruel–Maestrat</span>` +
    (legendOpen ? `<div id="legend-body">${legendBody}</div>` : "");
}
legend.onAdd = () => {
  const d = L.DomUtil.create("div", "legend");
  d.id = "legend";
  L.DomEvent.disableClickPropagation(d);
  return d;
};
legend.addTo(map);
renderLegend();

const all = [...D.top20, ...D.frontier, ...D.clusters].map(p => [p.lat, p.lon]);
map.fitBounds(L.latLngBounds(all.concat(D.origins.map(o => [o.lat, o.lon]))).pad(0.05));
</script>
