function popupHtml(p, kind) {
  const pin = `https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lon}`;
  const gm = `https://www.google.com/maps/@${p.lat},${p.lon},1200m/data=!3m1!1e3`;
  const sv = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${p.lat},${p.lon}&heading=${p.az}&pitch=${p.alt}`;
  const coords = `${p.lat}, ${p.lon}`;
  return `<div class="popup">
    <h3>${kind} · ${coords}</h3>
    ${p.band ? `<div style="color:#2F855A;font-weight:600">${p.band}</div>` : ""}
    <table>
      <tr><td>Totalidad</td><td><b>${p.dur}</b> (C2 ${p.c2})</td></tr>
      <tr><td>Desde Moaña</td><td><b>${p.dmoa} km</b> línea recta (~${Math.round(p.dmoa*1.3)} km coche)</td></tr>
      <tr><td>Desde Portosín</td><td>${p.dpor} km línea recta</td></tr>
      <tr><td>Elevación</td><td>${p.elev} m · prominencia ${p.prom} m</td></tr>
      <tr><td>Carretera</td><td>a ${p.road} m</td></tr>
      <tr><td>Brújula</td><td>sol al <b>${p.az}°</b> (O), a ${p.alt}° de altura</td></tr>
      <tr><td>Score esperado</td><td>${p.score} (p despejado ${p.p})</td></tr>
      ${p.boira ? "<tr><td>Boira</td><td>⚠️ sobre niebla habitual</td></tr>" : ""}
    </table>
    <div class="links">
      <a href="${pin}" target="_blank">📍 punto en Google Maps</a>
      <a href="${gm}" target="_blank">satélite (sin pin)</a>
      <a href="${sv}" target="_blank">Street View mirando al eclipse</a>
      <a href="#" onclick="navigator.clipboard.writeText('${coords}');this.textContent='copiado ✓';return false">copiar coords</a>
      <a href="#" style="color:#C53030" onclick="descartar('${p.lat},${p.lon}');return false">🗑 descartar</a>
    </div></div>`;
}

const REG = [];  // every placed marker: {key, marker, group} — discard support
function marker(p, cls, kind, style) {
  const icon = L.divIcon({ className: "", iconSize: null,
    html: `<div class="mk ${cls}" style="${style || ""}">${p.label}</div>` });
  return L.marker([p.lat, p.lon], { icon, title: `${kind} · ${p.dur}`, durS: p.dur_s })
    .bindPopup(popupHtml(p, kind), { maxWidth: 330 });
}
function addPt(group, p, cls, kind, style) {
  const m = marker(p, cls, kind, style);
  REG.push({ key: `${p.lat},${p.lon}`, marker: m, group });
  group.addLayer(m);
  return m;
}

// sequential single-hue ramp: totality seconds, light -> dark
const DUR_RAMP = [
  [50,  "#A9C6E8", "#1A202C"],   // < 50 s
  [75,  "#6497CC", "#1A202C"],   // 50-74 s
  [95,  "#2B6CB0", "#fff"],      // 75-94 s
  [1e9, "#17456E", "#fff"],      // >= 95 s
];
function durStyle(s) {
  const [, bg, fg] = DUR_RAMP.find(([lim]) => s < lim);
  return `background:${bg};color:${fg}`;
}

const TIER_COLOR = { A: "#E4572E", B: "#2F855A", C: "#2B6CB0" };
const lySel = L.layerGroup();
D.seleccion.forEach(p => addPt(lySel, p, "mk-fro", p.tier_name,

// fixed named zones: stable geographic grouping (assigned in Python by
// nearest zone center). One labeled bubble per zone; click opens its points.
const ZONES = {};
function zoneReg(p, cls, kind) {
  const z = ZONES[p.zone] ??= { name: p.zone, pts: [], group: L.layerGroup() };
  const m = addPt(z.group, p, cls, kind, durStyle(p.dur_s));
  z.pts.push(m);
}
D.clusters.forEach(p => zoneReg(p, "mk-cl", "Mejor de la zona"));
D.alts.forEach(p => zoneReg(p, "mk-alt", "Alternativa"));

const lyZonas = L.layerGroup();
function zoneStats(z) {
  const alive = z.pts.filter(m => z.group.hasLayer(m));
  return { n: alive.length,
           best: alive.length ? Math.max(...alive.map(m => m.options.durS || 0)) : 0 };
}
// reviewer split: N people (chosen in the UI), zones dealt serpentine-style
// by size (1..N,N..1) so the load balances and every copy computes the same
let N = +(localStorage.getItem("eclipse_n") || 3);
let YO = localStorage.getItem("eclipse_yo") || "";
let NOMBRE = localStorage.getItem("eclipse_nombre") || "";
let tallyOpen = window.innerWidth >= 480;  // phones: start collapsed, big panel eats the map
let WHO = {};
function computeWho() {
  const names = Object.values(ZONES)
    .sort((a, b) => b.pts.length - a.pts.length || a.name.localeCompare(b.name))
    .map(z => z.name);
  WHO = {};
  const serp = [...Array(N).keys()].concat([...Array(N).keys()].reverse());
  names.forEach((n, i) => { WHO[n] = String(serp[i % (2 * N)] + 1); });
}
window.setN = n => {
  N = n; localStorage.setItem("eclipse_n", n);
  if (+YO > n) { YO = ""; localStorage.setItem("eclipse_yo", ""); }
  computeWho(); refreshBubbles(); updateTally();
};
window.setYo = n => {
  YO = String(n); localStorage.setItem("eclipse_yo", YO);
  refreshBubbles(); updateTally();
};
window.setNombre = () => {
  const n = prompt("Tu nombre (así aparece en la hoja compartida al descartar):", NOMBRE);
  if (n === null) return;
  NOMBRE = n.trim(); localStorage.setItem("eclipse_nombre", NOMBRE);
  updateTally();
};
function bubbleIcon(z) {
  const s = zoneStats(z);
  const dim = YO && WHO[z.name] && WHO[z.name] !== YO ? ";opacity:.4" : "";
  return L.divIcon({ className: "", iconSize: null,
    html: `<div class="mk mk-zone" style="${durStyle(s.best)}${dim}">` +
          `${z.name} · ${s.best}s ×${s.n} · 👤${WHO[z.name] || "?"}</div>` });
}
function refreshBubbles() { Object.values(ZONES).forEach(z => z.bubble.setIcon(bubbleIcon(z))); }
computeWho();
Object.values(ZONES).forEach(z => {
  const lls = z.pts.map(m => m.getLatLng());
  z.bounds = L.latLngBounds(lls);
  const c = [lls.reduce((a, l) => a + l.lat, 0) / lls.length,
             lls.reduce((a, l) => a + l.lng, 0) / lls.length];
  z.bubble = L.marker(c, { icon: bubbleIcon(z) }).on("click", () => {
    lyZonas.removeLayer(z.bubble);
    map.addLayer(z.group);
    map.fitBounds(z.bounds.pad(0.25), { maxZoom: 12 });
  });
  lyZonas.addLayer(z.bubble);
});
window.replegarZonas = () => {
  Object.values(ZONES).forEach(z => {
    map.removeLayer(z.group);
    if (!lyZonas.hasLayer(z.bubble)) lyZonas.addLayer(z.bubble);
  });
  refreshBubbles();
  map.fitBounds(L.latLngBounds([...D.top20, ...D.frontier].map(p => [p.lat, p.lon])).pad(0.1));
};
const lyLim = L.layerGroup([
  L.polyline(D.south_limit, { color: "#C53030", weight: 2, dashArray: "8 6", opacity: 0.8 })
    .bindTooltip("límite sur de la totalidad — al sur de esta línea el eclipse NO es total",

  ...D.iso_lines.map(l =>

const lyCasa = L.layerGroup(D.origins.map(o =>

function rings(origin, color) {

lyZonas.addTo(map); lyTop.addTo(map); lyFro.addTo(map);

).addTo(map);

// --- firm (but reversible) discard WITH reason: hides the point everywhere,
// remembered across sessions (localStorage). Stored as {key: reason}.
const LS = "eclipse_descartados";
function loadDisc() {
  try {
    const v = JSON.parse(localStorage.getItem(LS) || "{}");
    return new Map(Array.isArray(v) ? v.map(k => [k, ""]) : Object.entries(v));
  } catch (e) { return new Map(); }
}
let discarded = loadDisc();
function saveDisc() {
  localStorage.setItem(LS, JSON.stringify(Object.fromEntries(discarded)));
  updateTally(); refreshBubbles(); renderLista();
}
function applyDiscard(k) {
  REG.forEach(r => { if (r.key === k) r.group.removeLayer(r.marker); });
}
// central Sheet (Apps Script): every discard/restore is posted there and
// sincronizar() pulls the shared state — the Sheet is the source of truth
const SHEET_URL = "https://script.google.com/macros/s/AKfycbxZ1MViZXtfklGzcNqHC4VrzrWxf9kMFmJ3saTWzOkPJ890cQXTHxAEh0u6Xo30V6ff/exec";
function postSheet(action, k, why) {
  if (!SHEET_URL) return;
  fetch(SHEET_URL, { method: "POST",
    body: JSON.stringify({ action, key: k, why: why || "", who: NOMBRE || YO }) })
    .catch(() => {});
}
window.sincronizar = async () => {
  if (!SHEET_URL) return;
  try {
    const state = await (await fetch(SHEET_URL)).json();
    REG.forEach(r => { if (!r.group.hasLayer(r.marker)) r.group.addLayer(r.marker); });
    discarded = new Map(Object.entries(state).map(([k, v]) =>
      [k, (v.why || "") + (v.who ? ` (👤${v.who})` : "")]));
    for (const k of discarded.keys()) applyDiscard(k);
    saveDisc();
  } catch (e) { alert("No se pudo sincronizar con la hoja: " + e); }
};
window.descartar = k => {
  if (!NOMBRE) setNombre();  // opportunistic: ask once, but don't block a "cancel" from discarding
  const why = prompt("¿Por qué se descarta? (opcional — llega a los demás al compartir)");
  if (why === null) return;  // cancelled: keep the point
  discarded.set(k, why.trim()); applyDiscard(k); map.closePopup(); saveDisc();
  postSheet("discard", k, why.trim());
};
window.restaurarUno = k => {
  discarded.delete(k);
  REG.forEach(r => { if (r.key === k && !r.group.hasLayer(r.marker)) r.group.addLayer(r.marker); });
  saveDisc();
  postSheet("restore", k);
};
window.restaurarTodo = () => {
  for (const k of discarded.keys()) postSheet("restore", k);
  discarded.clear();
  REG.forEach(r => { if (!r.group.hasLayer(r.marker)) r.group.addLayer(r.marker); });
  saveDisc();
};
// share the triage: each friend exports their discards (with reasons) and
// sends the code back; importing MERGES them with yours
window.exportarFiltrado = () => {
  navigator.clipboard.writeText(JSON.stringify(Object.fromEntries(discarded)));
  alert(`Copiado: ${discarded.size} descartes con sus motivos. Pégalo en el chat del grupo.`);
};
window.importarFiltrado = () => {
  const t = prompt("Pega aquí el filtrado de tu amigo:");
  if (!t) return;
  try {
    const v = JSON.parse(t);
    const entries = Array.isArray(v) ? v.map(k => [k, ""]) : Object.entries(v);
    entries.forEach(([k, why]) => {
      if (!discarded.has(k) || why) discarded.set(k, why || discarded.get(k) || "");
      applyDiscard(k);
    });
  } catch (e) { alert("Eso no parece un filtrado exportado."); return; }
  saveDisc();
};
window.toggleLista = () => {
  const d = document.getElementById("dlist");
  d.style.display = d.style.display === "block" ? "none" : "block";
  renderLista();
};
function renderLista() {
  const d = document.getElementById("dlist");
  if (!d || d.style.display !== "block") return;
  if (!discarded.size) { d.innerHTML = "<i>(nada descartado)</i>"; return; }
  const title = k => (REG.find(r => r.key === k)?.marker.options.title) || "";
  d.innerHTML = "<b>Descartados</b><br>" + [...discarded].map(([k, why]) =>
    `· ${title(k)} <small>(${k})</small><br>&nbsp;&nbsp;<i>${why || "sin motivo"}</i> — ` +
    `<a href="#" onclick="restaurarUno('${k}');return false">restaurar</a>`).join("<br>");
}
const tally = L.control({ position: "bottomright" });
tally.onAdd = () => {
  const d = L.DomUtil.create("div", "legend");
  d.id = "tally";
  L.DomEvent.disableClickPropagation(d);
  return d;
};
tally.addTo(map);
window.toggleTally = () => { tallyOpen = !tallyOpen; updateTally(); };
function updateTally() {
  const toggle = `<a href="#" onclick="toggleTally();return false" style="font-weight:700">` +
    `${tallyOpen ? "▾" : "▸"} 🗑 ${discarded.size} descartados` +
    `${NOMBRE ? " · 👤 " + NOMBRE : ""}</a>`;
  if (!tallyOpen) { document.getElementById("tally").innerHTML = toggle; return; }
  const somos = [2, 3, 4].map(n =>
    N === n ? `<b>[${n}]</b>`
            : `<a href="#" onclick="setN(${n});return false">${n}</a>`).join(" ");
  const yo = Array.from({ length: N }, (_, i) => String(i + 1)).map(n =>
    YO === n ? `<b>[${n}]</b>`
             : `<a href="#" onclick="setYo(${n});return false">${n}</a>`).join(" ");
  document.getElementById("tally").innerHTML = toggle + "<br>" +
    `👥 Somos: ${somos} · 👤 Turno: ${yo} <small>(atenúa las zonas de los otros)</small><br>` +
    `🖊️ Nombre: <b>${NOMBRE || "(sin poner)"}</b> ` +
    `<a href="#" onclick="setNombre();return false">${NOMBRE ? "cambiar" : "poner nombre"}</a> ` +
    `<small>(así queda en la hoja al descartar)</small><br>` +
    `<a href="#" onclick="toggleLista();return false">ver lista</a> · ` +
    `<a href="#" onclick="restaurarTodo();return false">restaurar todos</a><br>` +
    (SHEET_URL
      ? `<a href="#" onclick="sincronizar();return false">🔄 sincronizar con el grupo</a><br>`
      : `<a href="#" onclick="exportarFiltrado();return false">📤 copiar mi filtrado</a> · ` +
        `<a href="#" onclick="importarFiltrado();return false">📥 importar</a><br>`) +
    `<a href="#" onclick="replegarZonas();return false">⬆ replegar zonas</a>`;
}
for (const k of discarded.keys()) applyDiscard(k);
updateTally();
refreshBubbles();
if (SHEET_URL) sincronizar();

const legend = L.control({ position: "bottomleft" });
legend.onAdd = () => {
  const d = L.DomUtil.create("div", "legend");
  const body = `Todos los puntos muestran su totalidad en segundos.<br>
    <span class="dot" style="background:#E4572E"></span>Top 1–20 por score (A Mariña)<br>
    <span class="dot" style="background:#2F855A"></span>Compromisos: máx. totalidad por distancia<br>
    Burbuja "Xistral · 94s ×8" = zona con 8 puntos, el mejor de 94 s — clic para abrirla.<br>
    Mejor de cada zona (píldora) + alternativas (punto):<br>
    <span class="dot" style="background:#A9C6E8"></span>&lt;50s
    <span class="dot" style="background:#6497CC"></span>50–74s
    <span class="dot" style="background:#2B6CB0"></span>75–94s
    <span class="dot" style="background:#17456E"></span>≥95s<br>
    <span style="color:#C53030">- - -</span> límite sur de la totalidad e isolíneas 30/60/90 s<br>
    <small>Capa opcional "Selección final": 10 elegidos en planes A/B/C.
    Anillos: negro Moaña, gris Portosín. Distancias en línea recta; coche ≈ ×1.3.</small>`;
  // narrow screens (phones): start collapsed so it doesn't eat the map on load
  const open = window.innerWidth >= 480;
  d.innerHTML = `<span id="legend-toggle">ℹ️ Eclipse 12-08-2026 · barrido viewshed</span>` +
    `<div id="legend-body" style="display:${open ? "block" : "none"}">${body}</div>`;
  d.querySelector("#legend-toggle").onclick = () => {
    const b = d.querySelector("#legend-body");
    b.style.display = b.style.display === "none" ? "block" : "none";
  };
  L.DomEvent.disableClickPropagation(d);
  return d;
};
legend.addTo(map);

const all = [...D.top20, ...D.frontier, ...D.clusters].map(p => [p.lat, p.lon]);
map.fitBounds(L.latLngBounds(all.concat(D.origins.map(o => [o.lat, o.lon]))).pad(0.05));
</script>
</body>
</html>
